<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#0a0a0a"/>
  <rect x="0.5" y="0.5" width="63" height="63" rx="13.5" fill="none" stroke="#c9a84c" stroke-opacity="0.35"/>
  <!-- Apex: a peak with an ascending trend line breaking out to the top -->
  <path d="M12 46 L26 30 L36 38 L52 16" fill="none" stroke="#c9a84c" stroke-width="4.5"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- breakout marker at the apex -->
  <circle cx="52" cy="16" r="4.5" fill="#e8c97a"/>
  <!-- baseline -->
  <path d="M12 50 H52" stroke="#c9a84c" stroke-opacity="0.25" stroke-width="3" stroke-linecap="round"/>
</svg>
